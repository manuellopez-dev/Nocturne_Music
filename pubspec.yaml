name: nocturnemusic_app
description: Nocturne Music App
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio
  just_audio: ^0.9.40
  just_audio_background: ^0.0.1-beta.12

  # Estado
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.3

  # YouTube
  youtube_explode_dart: ^2.3.3

  # Obtención Straming
  shelf: ^1.4.1
  shelf_router: ^1.1.4

  # Auth
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.2.2

  # Base de datos
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.3
  path: ^1.9.0

  # UI
  flutter_animate: ^4.5.0
  palette_generator: ^0.3.3+3
  cached_network_image: ^3.3.1
  google_fonts: ^6.2.1

  # Navegación
  go_router: ^14.1.4

  # Utilidades
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/